# Auto Ops System Configuration
# 完全自动化运维系统配置

# 系统模式配置
system:
  mode: "intelligent"  # intelligent | adaptive | conservative
  learning_enabled: true
  collaboration_enabled: true
  predictive_scaling: true
  business_optimization: true
  
  # 性能阈值
  thresholds:
    cpu_usage_warning: 70  # CPU使用率警告阈值 (%)
    memory_usage_warning: 75  # 内存使用率警告阈值 (%)
    disk_usage_warning: 80  # 磁盘使用率警告阈值 (%)
    execution_time_warning: 300  # 执行时间警告阈值 (秒)
    success_rate_warning: 90  # 成功率警告阈值 (%)
    
  # 自动化级别
  automation_levels:
    monitoring: "full"  # full | partial | minimal
    decision_making: "assisted"  # autonomous | assisted | manual
    execution: "autonomous"  # autonomous | supervised | manual
    optimization: "adaptive"  # aggressive | adaptive | conservative

# 学习引擎配置
learning:
  # 强化学习参数
  reinforcement_learning:
    learning_rate: 0.1
    discount_factor: 0.9
    exploration_rate: 0.2
    exploration_decay: 0.995
    min_exploration_rate: 0.01
    
  # 经验管理
  experience_management:
    max_experiences: 10000
    batch_size: 32
    replay_buffer_size: 1000
    priority_replay: true
    
  # 策略优化
  policy_optimization:
    update_frequency: 100  # 每100次经验更新一次策略
    confidence_threshold: 0.7  # 策略置信度阈值
    success_rate_threshold: 0.8  # 策略成功率阈值
    
  # 反馈循环
  feedback_loops:
    positive_feedback_weight: 1.0
    negative_feedback_weight: 1.5  # 负面反馈权重更高
    neutral_feedback_weight: 0.5
    feedback_processing_interval: 3600  # 反馈处理间隔 (秒)

# 跨工作流协同配置
collaboration:
  # 工作流发现
  workflow_discovery:
    scan_interval: 3600  # 扫描间隔 (秒)
    auto_update: true
    dependency_analysis: true
    
  # 协作机会识别
  opportunity_detection:
    parallel_execution_threshold: 0.6  # 并行执行匹配度阈值
    resource_sharing_threshold: 0.7  # 资源共享相似度阈值
    workflow_merge_threshold: 0.8  # 工作流合并相似度阈值
    dependency_optimization_threshold: 0.5  # 依赖优化机会阈值
    
  # 资源池管理
  resource_pool:
    compute_total: 100.0  # 总计算资源 (CPU核心)
    memory_total: 16384.0  # 总内存资源 (MB)
    storage_total: 10240.0  # 总存储资源 (MB)
    network_total: 1000.0  # 总网络资源 (Mbps)
    database_total: 10.0  # 总数据库连接数
    
    # 资源分配策略
    allocation_strategy: "dynamic"  # dynamic | static | hybrid
    buffer_percentage: 20  # 资源缓冲百分比
    overallocation_limit: 10  # 超额分配限制 (%)

# 预测性扩展配置
predictive_scaling:
  # 工作负载分析
  workload_analysis:
    history_days: 30  # 历史数据分析天数
    pattern_detection: true
    trend_analysis: true
    seasonality_detection: true
    
  # 预测模型
  prediction_models:
    # 资源需求预测
    resource_prediction:
      model_type: "ensemble"  # ensemble | neural_network | time_series
      forecast_horizon: 24  # 预测时间范围 (小时)
      confidence_interval: 0.95  # 置信区间
      
    # 故障预测
    failure_prediction:
      model_type: "anomaly_detection"
      detection_window: 24  # 检测窗口 (小时)
      anomaly_threshold: 3.0  # 异常阈值 (标准差)
      
  # 伸缩策略
  scaling_strategies:
    compute_scaling:
      strategy: "threshold_based"  # threshold_based | predictive | hybrid
      scale_up_threshold: 70  # 扩容阈值 (%)
      scale_down_threshold: 30  # 缩容阈值 (%)
      cooldown_period: 300  # 冷却时间 (秒)
      
    memory_scaling:
      strategy: "predictive"
      scale_up_threshold: 75
      scale_down_threshold: 25
      cooldown_period: 300

# 业务价值优化配置
business_optimization:
  # 业务指标映射
  metric_mapping:
    technical_to_business: true
    mapping_file: "config/business-metrics-mapping.yaml"
    
  # 价值计算
  value_calculation:
    # 成本效益分析
    cost_benefit:
      operational_cost_weight: 0.4
      development_cost_weight: 0.3
      maintenance_cost_weight: 0.3
      
    # 业务影响评估
    business_impact:
      revenue_impact_weight: 0.5
      customer_satisfaction_weight: 0.3
      competitive_advantage_weight: 0.2
      
  # 优化优先级
  optimization_priorities:
    - priority: "critical"
      criteria: "success_rate < 80% OR execution_time > 600"
      weight: 1.0
      
    - priority: "high"
      criteria: "success_rate < 90% OR execution_time > 300"
      weight: 0.8
      
    - priority: "medium"
      criteria: "resource_usage > 80%"
      weight: 0.6
      
    - priority: "low"
      criteria: "all other cases"
      weight: 0.4

# 监控和报告配置
monitoring:
  # 实时监控
  realtime_monitoring:
    enabled: true
    sampling_interval: 60  # 采样间隔 (秒)
    retention_days: 7  # 数据保留天数
    
  # 性能指标
  performance_metrics:
    collection_enabled: true
    metrics:
      - "execution_time"
      - "success_rate"
      - "resource_usage"
      - "queue_length"
      - "error_rate"
      
  # 告警配置
  alerts:
    enabled: true
    notification_channels:
      - "email"
      - "slack"
      - "webhook"
      
    alert_levels:
      critical:
        conditions: "success_rate < 70% OR system_down"
        notification_frequency: "immediate"
        
      warning:
        conditions: "success_rate < 90% OR resource_usage > 80%"
        notification_frequency: "hourly"
        
      info:
        conditions: "optimization_opportunities_found"
        notification_frequency: "daily"

# 系统集成配置
integrations:
  # GitHub 集成
  github:
    enabled: true
    api_version: "2022-11-28"
    rate_limit_handling: "adaptive"
    
  # 数据库集成
  database:
    type: "sqlite"  # sqlite | postgresql | mysql
    path: "data/performance-metrics.db"
    backup_enabled: true
    backup_interval: 86400  # 备份间隔 (秒)
    
  # 外部服务
  external_services:
    monitoring_services:
      - "prometheus"
      - "grafana"
      
    notification_services:
      - "slack"
      - "email"
      - "telegram"

# 部署配置
deployment:
  # 环境配置
  environments:
    development:
      automation_level: "assisted"
      learning_enabled: true
      risk_tolerance: "high"
      
    staging:
      automation_level: "supervised"
      learning_enabled: true
      risk_tolerance: "medium"
      
    production:
      automation_level: "autonomous"
      learning_enabled: true
      risk_tolerance: "low"
      
  # 部署策略
  deployment_strategy:
    type: "blue_green"  # blue_green | canary | rolling
    validation_required: true
    rollback_enabled: true
    max_failure_rate: 5  # 最大失败率 (%)

# 安全和合规配置
security:
  # 访问控制
  access_control:
    authentication_required: true
    authorization_levels:
      - "read_only"
      - "operator"
      - "administrator"
      - "super_user"
      
  # 数据保护
  data_protection:
    encryption_enabled: true
    data_retention_policy: "compliance"
    audit_logging: true
    
  # 合规性
  compliance:
    gdpr_compliant: true
    hipaa_compliant: false
    soc2_compliant: true

# 维护配置
maintenance:
  # 定期维护
  scheduled_maintenance:
    enabled: true
    schedule: "weekly"
    maintenance_window: "sunday 02:00-04:00"
    
  # 自动更新
  auto_updates:
    enabled: true
    update_frequency: "weekly"
    test_before_deploy: true
    
  # 性能优化
  performance_optimization:
    enabled: true
    optimization_frequency: "daily"
    optimization_window: "off_peak"

# 调试和故障排除
debugging:
  # 日志配置
  logging:
    level: "INFO"  # DEBUG | INFO | WARNING | ERROR
    file_rotation: true
    max_file_size: "100MB"
    retention_days: 30
    
  # 调试工具
  debug_tools:
    profiling_enabled: true
    tracing_enabled: true
    metrics_exporter: true
    
  # 故障排除
  troubleshooting:
    auto_diagnosis: true
    suggested_solutions: true
    escalation_procedures: true