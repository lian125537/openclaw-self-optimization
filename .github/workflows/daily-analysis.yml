name: Daily Capability Analysis

on:
  schedule:
    # 每天凌晨 2 点运行（北京时间上午 10 点）
    - cron: '0 18 * * *'  # UTC 时间 18:00 = 北京时间 02:00
  workflow_dispatch:  # 支持手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv
        
    - name: Run capability analysis
      run: |
        python scripts/analyze-capabilities.py
        
    - name: Upload analysis report
      uses: actions/upload-artifact@v4
      with:
        name: capability-report
        path: |
          data/capability-report.json
          docs/capability-report.md
          
    - name: Create GitHub Issue
      if: success()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('docs/capability-report.md', 'utf8');
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `能力分析报告 - ${new Date().toISOString().split('T')[0]}`,
            body: report,
            labels: ['能力分析', '自动化']
          });
          
    - name: Send notification
      if: success()
      run: |
        echo "能力分析完成！"
        echo "报告已上传到 GitHub Actions Artifacts"
        echo "新 Issue 已创建"
