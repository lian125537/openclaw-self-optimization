name: Setup Secrets

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Create placeholder secrets
      run: |
        echo "Please manually configure the following secrets in GitHub:"
        echo "1. GITHUB_TOKEN - Your Personal Access Token"
        echo "2. TELEGRAM_BOT_TOKEN - Telegram Bot Token (optional)"
        echo "3. TELEGRAM_CHAT_ID - Telegram Chat ID (optional)"
        echo ""
        echo "Go to: https://github.com/lian125537/openclaw-self-optimization/settings/secrets/actions"