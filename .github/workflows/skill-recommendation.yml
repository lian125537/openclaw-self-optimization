name: Skill Recommendation

on:
  workflow_dispatch:  # 手动触发
  schedule:
    # 每周三和周六运行（北京时间上午 10 点）
    - cron: '0 18 * * 3,6'

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
    - name: Run skill recommendation
      run: |
        python scripts/simple-recommend-test.py
        
    - name: Upload recommendation report
      uses: actions/upload-artifact@v4
      with:
        name: skill-recommendations
        path: |
          data/skill-recommendations.json
          docs/skill-recommendations.md
        retention-days: 7
        if-no-files-found: warn
          
    - name: Create GitHub Issue
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('docs/skill-recommendations.md', 'utf8');
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `技能推荐报告 - ${new Date().toISOString().split('T')[0]}`,
            body: report,
            labels: ['技能推荐', '自动化']
          });
          
    - name: Send notification
      if: success()
      run: |
        echo "技能推荐完成！"
        echo "报告已上传到 GitHub Actions Artifacts"
        echo "新 Issue 已创建"