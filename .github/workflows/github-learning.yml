name: GitHub Learning

on:
  schedule:
    # 每周一、四运行（北京时间上午 10 点）
    - cron: '0 18 * * 1,4'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write
  issues: write
jobs:
  learn:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
    - name: Run GitHub learning
      run: |
        python scripts/github-learning.py
        
    - name: Upload learning report
      uses: actions/upload-artifact@v4
      with:
        name: github-learning-report
        path: |
          data/github-learning-report.json
          docs/github-learning-report.md
          
    - name: Create GitHub Issue
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('docs/github-learning-report.md', 'utf8');
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `GitHub 学习报告 - ${new Date().toISOString().split('T')[0]}`,
            body: report,
            labels: ['学习', '自动化']
          });
          
    - name: Send notification
      if: success()
      run: |
        echo "GitHub 学习完成！"
        echo "报告已上传到 GitHub Actions Artifacts"
        if-no-files-found: warn
        echo "新 Issue 已创建"