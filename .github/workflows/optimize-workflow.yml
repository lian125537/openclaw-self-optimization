name: Optimize Workflow

on:
  schedule:
    # 每月 1 号运行（北京时间上午 10 点）
    - cron: '0 18 1 * *'
  workflow_dispatch:  # 手动触发

jobs:
  optimize:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
    - name: Run workflow optimization
      run: |
        python scripts/optimize-workflow.py
        
    - name: Upload optimization plan
      uses: actions/upload-artifact@v3
      with:
        name: optimization-plan
        path: |
          data/optimization-plan.json
          docs/optimization-plan.md
          
    - name: Create GitHub Issue
      if: success()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('docs/optimization-plan.md', 'utf8');
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `优化计划 - ${new Date().toISOString().split('T')[0]}`,
            body: plan,
            labels: ['优化', '自动化']
          });
          
    - name: Send notification
      if: success()
      run: |
        echo "优化计划生成完成！"
        echo "报告已上传到 GitHub Actions Artifacts"
        echo "新 Issue 已创建"