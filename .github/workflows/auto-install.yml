name: Auto Install Skills

on:
  workflow_dispatch:  # 手动触发
  schedule:
    # 每周一和周四运行（北京时间上午 10 点）
    - cron: '0 18 * * 1,4'

jobs:
  install:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
    - name: Install ClawHub CLI
      run: |
        # 安装 ClawHub CLI
        npm install -g @openclaw/clawhub
        
    - name: Run auto install
      run: |
        python scripts/auto-install.py
        
    - name: Upload install report
      uses: actions/upload-artifact@v4
      with:
        name: install-report
        path: |
          data/install-report.json
          docs/install-report.md
          
    - name: Create GitHub Issue
      if: success()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('docs/install-report.md', 'utf8');
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `技能安装报告 - ${new Date().toISOString().split('T')[0]}`,
            body: report,
            labels: ['技能安装', '自动化']
          });
          
    - name: Send notification
      if: success()
      run: |
        echo "技能安装完成！"
        echo "报告已上传到 GitHub Actions Artifacts"
        echo "新 Issue 已创建"
